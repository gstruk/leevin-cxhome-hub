<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leevin Managers — Leevin Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080b14; --surface:rgba(14,17,28,0.72); --surface2:rgba(20,24,38,0.85);
  --border:rgba(255,255,255,0.07); --text:#e8e8e8; --muted:#6b7280;
  --accent:#ec4899; --accent-rgb:236,72,153;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
header,main,footer{position:relative;z-index:1;}
header{background:rgba(10,12,20,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-brand{display:flex;align-items:center;gap:12px;}
.header-icon{width:34px;height:34px;background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.25);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--accent);}
.header-icon svg{width:18px;height:18px;}
.header-brand-text strong{font-size:0.92rem;font-weight:700;letter-spacing:-0.01em;color:var(--text);display:block;}
.header-brand-text small{font-size:0.68rem;color:var(--muted);font-weight:400;}
.header-right{display:flex;align-items:center;gap:12px;}
.user-email{font-size:0.72rem;color:var(--muted);}
.back-btn,.auth-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:0.78rem;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:color .15s,border-color .15s;}
.back-btn:hover{color:var(--text);border-color:rgba(236,72,153,0.4);}
.auth-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 28px;}
.cs-wrap{text-align:center;max-width:480px;}
.cs-icon{width:72px;height:72px;background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.2);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;color:var(--accent);}
.cs-icon svg{width:32px;height:32px;}
.cs-wrap h1{font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:10px;}
.cs-wrap h1 span{color:var(--accent);}
.cs-subtitle{color:var(--muted);font-size:0.92rem;margin-bottom:28px;line-height:1.5;}
.cs-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-size:0.78rem;font-weight:700;letter-spacing:0.04em;background:rgba(236,72,153,0.1);color:var(--accent);border:1px solid rgba(236,72,153,0.3);margin-bottom:20px;}
.cs-msg{color:var(--muted);font-size:0.82rem;line-height:1.6;}
footer{text-align:center;padding:18px;color:var(--muted);font-size:0.73rem;border-top:1px solid var(--border);}
</style>
</head>
<body>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
    apiKey:            "AIzaSyD3c_JWbEtLQ2eMlSWAJTxPILN67XkjwTk",
    authDomain:        "leevin-cxhome-hub.firebaseapp.com",
    projectId:         "leevin-cxhome-hub",
    storageBucket:     "leevin-cxhome-hub.firebasestorage.app",
    messagingSenderId: "502783167107",
    appId:             "1:502783167107:web:8a86641b6ef897bd0ca9b6"
  };
  const MANAGERS = new Set([
    'g.struk@leevinhome.com',
    'eduardo@leevingroup.com',
    'p.coppini@leevinhome.com',
    'lais.ribeiro@leevingroup.com',
    'l.lacerda@leevinhome.com',
    'j.yoo@leevingroup.com',
  ]);
  const auth = getAuth(initializeApp(firebaseConfig));
  document.documentElement.style.visibility = 'hidden';
  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.replace('/leevin-cxhome-hub/login.html');
    } else if (!MANAGERS.has(user.email)) {
      window.location.replace('/leevin-cxhome-hub/');
    } else {
      document.documentElement.style.visibility = '';
      const el = document.getElementById('user-email');
      if (el) el.textContent = user.email;
    }
  });
  window.doSignOut = () => signOut(auth).then(() =>
    window.location.replace('/leevin-cxhome-hub/login.html')
  );
</script>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="header-brand">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="header-brand-text">
      <strong>Leevin-CXHome-Hub</strong>
      <small>Leevin Managers</small>
    </div>
  </div>
  <div class="header-right">
    <span class="user-email" id="user-email"></span>
    <a class="back-btn" href="https://gstruk.github.io/leevin-cxhome-hub/">&#8592; Hub</a>
    <button class="auth-btn" onclick="doSignOut()">Sign out</button>
  </div>
</header>

<main>
  <div class="cs-wrap">
    <div class="cs-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <h1>Leevin <span>Managers</span></h1>
    <p class="cs-subtitle">Managers &amp; Directors tools</p>
    <span class="cs-badge">Coming Soon</span>
    <p class="cs-msg">This section is under construction.<br>Manager and director tools will be available here soon.</p>
  </div>
</main>

<footer>Leevin Home &mdash; Leevin Managers &mdash; <span id="footer-year"></span></footer>

<script>
document.getElementById('footer-year').textContent = new Date().getFullYear();
(function(){
  const cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
  const N=38,DIST=220,SPD=0.3;
  let W,H,nodes,t=0;
  const PAL=[[236,72,153],[244,114,182],[251,113,133],[217,70,239],[168,85,247]];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function mk(){const c=PAL[Math.floor(Math.random()*PAL.length)];return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*SPD,vy:(Math.random()-.5)*SPD,r:Math.random()*2.5+1.2,color:c,phase:Math.random()*Math.PI*2};}
  function frame(){
    ctx.clearRect(0,0,W,H);t+=0.018;
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<DIST){const a=(1-d/DIST)*0.12,c1=nodes[i].color,c2=nodes[j].color;
        ctx.strokeStyle=`rgba(${(c1[0]+c2[0])>>1},${(c1[1]+c2[1])>>1},${(c1[2]+c2[2])>>1},${a})`;
        ctx.lineWidth=0.9;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
    }
    for(const n of nodes){
      const p=1+0.35*Math.sin(t+n.phase),[r,g,b]=n.color,gR=n.r*p*4.5;
      const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,gR);
      gr.addColorStop(0,`rgba(${r},${g},${b},0.55)`);gr.addColorStop(0.4,`rgba(${r},${g},${b},0.18)`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.beginPath();ctx.arc(n.x,n.y,gR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*p*0.85,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},0.95)`;ctx.shadowColor=`rgba(${r},${g},${b},0.9)`;ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
      n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    }
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize',resize);resize();
  nodes=Array.from({length:N},mk);frame();
})();
</script>
</body>
</html>
