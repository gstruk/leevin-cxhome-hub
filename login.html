<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Leevin Home</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 16px;
    padding: 48px 40px; text-align: center; width: 100%; max-width: 360px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
  }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #7c6af7, #58a6ff);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; margin: 0 auto 20px;
    box-shadow: 0 0 28px rgba(124,106,247,0.45);
  }
  h1 { color: #e6edf3; font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
  p  { color: #7d8590; font-size: 0.85rem; line-height: 1.5; margin-bottom: 32px; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 13px 20px; border-radius: 10px;
    background: #fff; color: #1f1f1f; font-size: 0.92rem; font-weight: 600;
    border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-google:hover  { opacity: 0.93; }
  .btn-google:active { transform: scale(0.98); }
  .btn-google svg    { width: 20px; height: 20px; flex-shrink: 0; }
  .btn-google.loading { opacity: 0.6; pointer-events: none; }
  .error { color: #f85149; font-size: 0.8rem; margin-top: 16px; min-height: 20px; line-height: 1.4; }
  .divider { margin: 24px 0; border: none; border-top: 1px solid #30363d; }
  .footer-note { color: #484f58; font-size: 0.72rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏠</div>
  <h1>Leevin-CXHome-Hub</h1>
  <p>Sign in with your Leevin Home Google account to access the Operations Centre</p>

  <button class="btn-google" id="signin-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>

  <div class="error" id="error-msg"></div>
  <hr class="divider">
  <div class="footer-note">Access restricted to @leevinhome.com accounts</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyD3c_JWbEtLQ2eMlSWAJTxPILN67XkjwTk",
    authDomain:        "leevin-cxhome-hub.firebaseapp.com",
    projectId:         "leevin-cxhome-hub",
    storageBucket:     "leevin-cxhome-hub.firebasestorage.app",
    messagingSenderId: "502783167107",
    appId:             "1:502783167107:web:8a86641b6ef897bd0ca9b6"
  };

  const auth     = getAuth(initializeApp(firebaseConfig));
  const provider = new GoogleAuthProvider();
  const REPO     = '/leevin-cxhome-hub';

  // Already signed in → skip login page
  onAuthStateChanged(auth, user => {
    if (user) window.location.replace(REPO + '/');
  });

  const GOOGLE_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Sign in with Google`;

  window.signIn = async () => {
    const btn = document.getElementById('signin-btn');
    const err = document.getElementById('error-msg');
    err.textContent = '';
    btn.classList.add('loading');
    btn.textContent = 'Signing in…';
    try {
      const result = await signInWithPopup(auth, provider);
      const email  = result.user.email || '';
      if (!email.endsWith('@leevinhome.com')) {
        await auth.signOut();
        err.textContent = 'Access restricted to @leevinhome.com accounts.';
        btn.classList.remove('loading');
        btn.innerHTML = GOOGLE_SVG;
        return;
      }
      window.location.replace(REPO + '/');
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') err.textContent = e.message;
      btn.classList.remove('loading');
      btn.innerHTML = GOOGLE_SVG;
    }
  };
</script>
</body>
</html>
